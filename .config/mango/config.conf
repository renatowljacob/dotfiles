# STARTUP

exec-once=wl-paste --primary --watch wl-copy # >wayland
exec-once=swaybg -i ~/Pictures/wallpapers/anime/bocchi001.png
exec-once=waybar
exec-once=qbittorrent
exec-once=udiskie -s
exec-once=fcitx5
exec-once=sed -i 's/\(  *offset.*\)(.*)/\1(6,6)/' ~/.config/dunst/dunstrc
exec-once=hypridle

# SETTINGS

# Master/stack
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=1

# Scroller
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Misc
no_border_when_single=1
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0

# Focus
sloppyfocus=1
warpcursor=1
focus_cross_tag=0
enable_floating_snap=0
drag_tile_to_tile=1

# Keyboard
repeat_rate=50
repeat_delay=250
numlockon=1
xkb_rules_layout=br
xkb_rules_model=abnt2
xkb_rules_options=compose:rwin,caps:escape_shifted_capslock

# Trackpad
disable_trackpad=1

# Mouse
mouse_natural_scrolling=0

# APPEARANCE

# Colors
rootcolor=0x201b14ff
bordercolor=0x292e42ff
focuscolor=0xff9e64ff
maximizescreencolor=0x89aa61ff
urgentcolor=0xf7768eff

# Opacity
focused_opacity=1.0
unfocused_opacity=1.0

# Gaps
gappih=6
gappiv=6
gappoh=6
gappov=6

# Border
borderpx=3
border_radius=4
no_radius_when_single=1

# Scratchpad
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9

# Cursor
cursor_hide_timeout=5
cursor_size=24
cursor_theme=Breeze

# Animations
animations=1
layer_animations=1
animation_type_open=fade
animation_type_close=fade
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_open=200
animation_duration_close=200
animation_duration_move=100
animation_duration_tag=200
animation_duration_focus=200
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# KEYBINDINGS

# Terminal
bind=super,space,spawn,rofi -matching fuzzy -sort -sorting-method fzf -show run
bind=super,Return,spawn_shell,ghostty

# Launcher
bind=super+alt,Return,spawn,foot

# Exit
bind=super,q,killclient
bind=super+ctrl,q,reload_config
bind=super+ctrl+alt,q,quit

# Focus
bind=super,j,focusstack,next
bind=super,k,focusstack,prev

# Window motion
bind=super+ctrl,j,exchange_stack_client,next
bind=super+ctrl,k,exchange_stack_client,prev
bind=super+ctrl,Return,zoom

# Layout
bind=super,t,spawn,mango-set-layout "T" # tile
bind=super,d,spawn,mango-set-layout "K" # deck
bind=super,m,spawn,mango-set-layout "M" # monocle
bind=super,s,spawn,mango-set-layout "S" # scroller
bind=super,c,spawn,mango-set-layout cycle
bind=super+ctrl,space,spawn,mango-set-layout toggle

# Using hjkl for these would be kinda clunky since they're already bound to
# Master/stack layout
bind=super,Left,focusdir,left
bind=super,Right,focusdir,right
bind=super,Up,focusdir,up
bind=super,Down,focusdir,down
bind=super+ctrl,Up,exchange_client,up
bind=super+ctrl,Down,exchange_client,down
bind=super+ctrl,Left,exchange_client,left
bind=super+ctrl,Right,exchange_client,right

bind=super,l,setmfact,+0.05
bind=super,h,setmfact,-0.05
bind=super,i,incnmaster,1
bind=super,u,incnmaster,-1

# Scroller layout
bind=super,e,set_proportion,1.0
bind=super,x,switch_proportion_preset,

# Window status
bind=super+ctrl,0,toggleglobal,
bind=super,o,toggleoverview,
bind=super,g,togglefloating,
bind=super+shift,f,togglefullscreen,

# Toggle bar
bind=super,b,spawn,pkill --signal 10 waybar

# Minimize/scratchpad
bind=super+ctrl,m,minimized,
bind=super+shift,m,restore_minimized
bind=super+ctrl,s,toggle_scratchpad,

# Tag switch
bind=super,p,spawn,mango-set-tag prev
bind=super,n,spawn,mango-set-tag next
bind=super+ctrl,p,spawn,mango-set-tag prev-move-client
bind=super+ctrl,n,spawn,mango-set-tag next-move-client
bind=super+shift,tab,spawn,mango-set-tag prev-has-client
bind=super,tab,spawn,mango-set-tag next-has-client

bind=super,1,spawn,mango-set-tag 0
bind=super,2,spawn,mango-set-tag 1
bind=super,3,spawn,mango-set-tag 2
bind=super,4,spawn,mango-set-tag 3
bind=super,5,spawn,mango-set-tag 4
bind=super,6,spawn,mango-set-tag 5
bind=super,7,spawn,mango-set-tag 6
bind=super,8,spawn,mango-set-tag 7
bind=super,9,spawn,mango-set-tag 8
bind=super,0,view,0,0

bind=super+ctrl,1,tagsilent,1,0
bind=super+ctrl,2,tagsilent,2,0
bind=super+ctrl,3,tagsilent,3,0
bind=super+ctrl,4,tagsilent,4,0
bind=super+ctrl,5,tagsilent,5,0
bind=super+ctrl,6,tagsilent,6,0
bind=super+ctrl,7,tagsilent,7,0
bind=super+ctrl,8,tagsilent,8,0
bind=super+ctrl,9,tagsilent,9,0
bind=super+ctrl,0,tagsilent,0,0

# Screenshot and stuff
bind=NONE,Print,spawn,wayland-screenshot
bind=super,Print,spawn,wayland-screenshot window
bind=super+ctrl,Print,spawn,wayland-screenshot select
bind=super+ctrl,r,spawn,wayland-colorpicker rgb
bind=super+ctrl,h,spawn,wayland-colorpicker hex

# Toggle monitor
bindl=super+ctrl+alt,m,toggle_monitor,HDMI-A-1

# Mouse Bindings
# btn_left and btn_right can't bind none mod key
mousebind=super,btn_left,moveresize,curmove
# mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=super,btn_right,moveresize,curresize

# RULES

# Tag rules
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# Layer rules
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi
